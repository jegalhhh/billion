<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>1억 만들기</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: '#0ea5e9', 'brand-dark': '#0284c7' } } }
    }
  </script>
</head>
<body class="bg-slate-50">

<!-- ── 로그인 화면 ── -->
<div id="auth-screen">
  <img src="static/logo.png" alt="로고" class="logo">
  <h1 class="text-2xl font-bold text-slate-800 mb-1">1억 만들기</h1>
  <p class="text-sm text-slate-500 mb-8">주간 저축 목표 달성 트래커</p>

  <div class="w-full max-w-sm space-y-3">
    <div class="field">
      <label>이메일</label>
      <input id="auth-email" type="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label>비밀번호</label>
      <input id="auth-password" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div id="auth-signup-extra" class="hidden space-y-3">
      <div class="field">
        <label>아이디 (단축어용 sender 이름)</label>
        <input id="auth-username" type="text" placeholder="예: 민혁">
      </div>
    </div>
    <p id="auth-error" class="text-xs text-red-500 hidden"></p>
    <button id="auth-submit" class="btn-primary" onclick="handleAuth()">로그인</button>
    <div class="flex items-center justify-center gap-3 pt-1">
      <button class="btn-ghost text-sm" onclick="toggleMode()">
        <span id="toggle-label">회원가입</span>
      </button>
      <span class="text-slate-300">|</span>
      <button class="btn-ghost text-sm" onclick="forgotPassword()">비밀번호 찾기</button>
    </div>
    <p id="auth-info" class="text-xs text-center text-emerald-600 hidden"></p>
  </div>
</div>

<!-- ── 대시보드 ── -->
<div id="dashboard" class="hidden pb-32">

  <!-- 헤더 -->
  <div class="bg-brand text-white px-4 pb-5 pt-safe">
    <!-- 최종 목표 -->
    <div class="flex items-center justify-between mb-2 pt-2">
      <span class="text-xs text-white/80">🎯 최종 목표</span>
      <div class="flex items-center gap-2">
        <span id="final-goal-text" class="text-xs text-white/80"></span>
        <a href="setup.html" class="text-white/70 hover:text-white">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </a>
      </div>
    </div>
    <div class="progress-track h-1.5 mb-3">
      <div id="final-bar" class="progress-bar bg-white" style="width:0%"></div>
    </div>

    <!-- 주간 네비 -->
    <div class="flex items-center justify-between">
      <button onclick="prevWeek()" class="p-2 rounded-full hover:bg-white/20 active:bg-white/30 transition text-white/80">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="text-center">
        <p id="week-range" class="text-sm font-semibold"></p>
        <p id="week-label-text" class="text-xs text-white/70 mt-0.5"></p>
      </div>
      <button id="next-week-btn" onclick="nextWeek()" class="p-2 rounded-full hover:bg-white/20 active:bg-white/30 transition text-white/80">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- 컨텐츠 -->
  <div class="px-4 -mt-2 space-y-3">

    <!-- 잔액 불일치 경고 -->
    <div id="balance-warn" class="hidden banner banner-warn">
      <span class="text-xl">⚠️</span>
      <div>
        <p class="text-xs font-semibold text-amber-700">잔액 불일치 감지</p>
        <p class="text-xs text-amber-600">미확인 내역을 확인해주세요.</p>
      </div>
    </div>

    <!-- 주간 저축 카드 -->
    <div class="card">
      <div class="flex items-center justify-between mb-3">
        <div>
          <p class="text-xs text-slate-500 mb-0.5">이번 주 저축</p>
          <p id="week-savings" class="text-2xl font-bold text-sky-600">0원</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-slate-500 mb-0.5">주간 목표</p>
          <p id="week-goal-text" class="text-sm font-semibold text-slate-700">0원</p>
        </div>
      </div>
      <div class="progress-track h-3 mb-2">
        <div id="week-bar" class="progress-bar bg-sky-500" style="width:0%"></div>
      </div>
      <div class="flex items-center justify-between">
        <span class="text-xs text-slate-400">달성률</span>
        <span id="week-rate" class="text-sm font-bold text-sky-600">0%</span>
      </div>
      <div class="flex items-center gap-3 mt-3 pt-3 border-t border-slate-50">
        <span class="text-xs text-slate-400">수입</span>
        <span id="week-income" class="text-xs font-medium text-emerald-600">+0원</span>
        <span class="text-slate-200">|</span>
        <span class="text-xs text-slate-400">지출</span>
        <span id="week-expense" class="text-xs font-medium text-red-400">-0원</span>
      </div>
    </div>

    <!-- 일일 힌트 -->
    <div id="hint-card" class="hidden"></div>

    <!-- 거래 내역 -->
    <div class="card overflow-hidden !p-0">
      <div class="px-4 pt-4 pb-2 border-b border-slate-50 flex items-center justify-between">
        <h2 id="tx-list-title" class="text-sm font-semibold text-slate-700"></h2>
        <button onclick="openManual()" class="text-xs text-brand font-medium">+ 직접 입력</button>
      </div>
      <ul id="tx-list" class="tx-list">
        <li class="py-12 text-center">
          <p class="text-4xl mb-3">📭</p>
          <p class="text-sm text-slate-400">거래 내역이 없어요</p>
        </li>
      </ul>
    </div>
  </div>
</div>

<!-- ── 하단 바 (로그아웃) ── -->
<div id="bottom-bar" class="bottom-bar hidden">
  <button onclick="signOut()" class="w-full h-14 btn-primary">로그아웃</button>
</div>

<!-- ── 미확인 내역 수정 모달 ── -->
<div id="modal-unconfirmed" class="modal-overlay hidden" onclick="closeUnconfirmed(event)">
  <div class="modal-sheet">
    <h3 class="text-base font-semibold mb-4">미확인 내역 수정</h3>
    <input type="hidden" id="uc-id">
    <div class="space-y-3">
      <div class="field">
        <label>거래 종류</label>
        <select id="uc-type">
          <option value="1">입금</option>
          <option value="-1">출금</option>
        </select>
      </div>
      <div class="field">
        <label>금액 (원)</label>
        <input id="uc-amount" type="number" min="1" placeholder="금액">
      </div>
      <div class="field">
        <label>상대방</label>
        <input id="uc-counterpart" type="text" placeholder="상대방 이름">
      </div>
      <div class="field">
        <label>거래 일자</label>
        <input id="uc-date" type="date">
      </div>
      <div class="field">
        <label>거래 시각</label>
        <input id="uc-time" type="time">
      </div>
      <button class="btn-primary" onclick="confirmUnconfirmed()">확인 처리</button>
    </div>
  </div>
</div>

<!-- ── 수동 입력 모달 ── -->
<div id="modal-manual" class="modal-overlay hidden" onclick="closeManual(event)">
  <div class="modal-sheet">
    <h3 class="text-base font-semibold mb-4">거래 직접 입력</h3>
    <div class="space-y-3">
      <div class="field">
        <label>거래 종류</label>
        <select id="manual-type">
          <option value="1">입금</option>
          <option value="-1">출금</option>
        </select>
      </div>
      <div class="field">
        <label>금액 (원)</label>
        <input id="manual-amount" type="number" min="1" placeholder="금액">
      </div>
      <div class="field">
        <label>상대방 / 메모</label>
        <input id="manual-counterpart" type="text" placeholder="예: 카페 결제">
      </div>
      <div class="field">
        <label>잔액 (원, 선택)</label>
        <input id="manual-balance" type="number" placeholder="입력 안 하면 자동 계산">
      </div>
      <div class="field">
        <label>거래 일자</label>
        <input id="manual-date" type="date">
      </div>
      <div class="field">
        <label>거래 시각</label>
        <input id="manual-time" type="time">
      </div>
      <button class="btn-primary" onclick="submitManual()">저장</button>
    </div>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
