<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>1억 만들기 — 설정</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: { brand: '#0ea5e9', 'brand-dark': '#0284c7' } } }
    }
  </script>
</head>
<body class="bg-slate-50">

<div class="px-4 pt-6 pb-32 max-w-lg mx-auto space-y-5">
  <!-- 헤더 -->
  <div class="flex items-center gap-3">
    <a href="index.html" class="text-slate-400 hover:text-slate-600">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-lg font-bold text-slate-800">계좌 · 목표 설정</h1>
  </div>

  <!-- 계좌 정보 -->
  <div class="card space-y-4">
    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">계좌 정보</h2>
    <div class="field">
      <label>은행</label>
      <select id="bank-code">
        <option value="KAKAO">카카오뱅크</option>
        <option value="KB">KB국민은행</option>
        <option value="NH">농협</option>
        <option value="WOORI">우리은행</option>
        <option value="SHINHAN">신한은행</option>
        <option value="HANA">하나은행</option>
        <option value="ETC">기타</option>
      </select>
    </div>
    <div class="field">
      <label>계좌 별칭</label>
      <input id="alias" type="text" placeholder="예: 카뱅 1억 만들기 통장">
    </div>
    <div class="field">
      <label>현재 잔액 (원) — 기준 시작점</label>
      <input id="initial-balance" type="number" placeholder="예: 3000000">
    </div>
  </div>

  <!-- 저축 목표 -->
  <div class="card space-y-4">
    <h2 class="text-sm font-semibold text-slate-500 uppercase tracking-wide">저축 목표</h2>
    <div class="field">
      <label>최종 목표 금액 (원)</label>
      <input id="final-goal" type="number" placeholder="예: 100000000">
    </div>
    <div class="field">
      <label>주간 목표 저축 금액 (원)</label>
      <input id="week-goal" type="number" placeholder="예: 900000">
    </div>
    <div class="field">
      <label>주 기산점 요일</label>
      <select id="week-start-day">
        <option value="0">월요일</option>
        <option value="1">화요일</option>
        <option value="2">수요일</option>
        <option value="3">목요일</option>
        <option value="4">금요일</option>
        <option value="5">토요일</option>
        <option value="6">일요일</option>
      </select>
    </div>
  </div>

  <!-- iOS 단축어 안내 -->
  <div class="card bg-sky-50 border border-sky-100 space-y-2">
    <h2 class="text-sm font-semibold text-sky-700">📱 iOS 단축어 sender 이름</h2>
    <p class="text-xs text-sky-600">아이디(username)를 단축어에 입력하면 알림이 자동으로 연결됩니다.</p>
    <div class="field">
      <label class="text-sky-700">아이디 (username)</label>
      <input id="setup-username" type="text" placeholder="예: 민혁" class="border-sky-200">
    </div>
    <p class="text-xs text-sky-400">* 최초 1회 설정 후 변경 불필요 — 단축어에 동일하게 입력하세요.</p>
  </div>

  <p id="setup-error" class="text-xs text-red-500 hidden"></p>
  <p id="setup-success" class="text-xs text-emerald-600 hidden"></p>
</div>

<!-- 하단 저장 버튼 -->
<div class="bottom-bar">
  <button class="btn-primary" onclick="saveSetup()">저장</button>
</div>

<script type="module">
  import { initSetup, saveSetup as _save } from './app.js';
  window.saveSetup = _save;
  initSetup();
</script>
</body>
</html>
